name: Fetch RSS Feeds

on:
  schedule:
    - cron: '0 * * * *'   # 每小时整点触发
  workflow_dispatch:        # 允许手动触发（测试用）

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许提交到仓库

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Fetch RSS feeds
        run: python scripts/fetch_rss.py

      - name: Commit feeds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feeds.json
          git diff --staged --quiet || git commit -m "chore: update feeds.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
